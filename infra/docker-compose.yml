version: "3.9"

# xmbot production stack
# Usage: docker-compose up -d

services:
  # ── ambot Execution Engine ────────────────────────────────────────────────
  ambot:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ambot
    container_name: xmbot_ambot
    restart: unless-stopped
    env_file: ../../.env
    volumes:
      - ambot_data:/app/data
      - ambot_logs:/app/logs
    networks:
      - xmbot_net
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "from ambot.config import get_config; get_config()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web API (mbot.online) ─────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: xmbot_web
    restart: unless-stopped
    env_file: ../../.env
    environment:
      - DB_URL=postgresql+psycopg2://xmbot:${POSTGRES_PASSWORD}@db:5432/xmbot
    ports:
      - "8000:8000"
    volumes:
      - ambot_data:/app/data:ro          # Read-only access to statements for PDF download
    networks:
      - xmbot_net
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL Database (production) ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: xmbot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xmbot
      POSTGRES_USER: xmbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xmbot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: xmbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - xmbot_net
    depends_on:
      - web

volumes:
  ambot_data:
  ambot_logs:
  postgres_data:

networks:
  xmbot_net:
    driver: bridge
